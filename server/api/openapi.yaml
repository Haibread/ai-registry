openapi: 3.1.0
info:
  title: AI Registry API
  description: >
    Centralized registry for MCP servers and AI agents.
    Exposes a versioned HTTP API; all UIs are clients of this API.
  version: 0.1.0
  contact:
    name: AI Registry Team
servers:
  - url: /
    description: Current host

tags:
  - name: system
    description: Health, readiness, and observability
  - name: publishers
    description: Publisher management (admin only)
  - name: mcp
    description: MCP server registry (v1)
  - name: agents
    description: AI agent registry (v1)
  - name: audit
    description: Audit log (admin only)
  - name: v0
    description: MCP registry wire-format (spec-compatible /v0 surface)

paths:
  # ── System ───────────────────────────────────────────────────────────────

  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      tags: [system]
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness probe
      description: Returns 200 when the service is ready to accept traffic (DB reachable).
      tags: [system]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /metrics:
    get:
      operationId: metrics
      summary: Prometheus metrics (admin only)
      description: Exposes Prometheus-format metrics for scraping.
      tags: [system]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Prometheus metrics text
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /openapi.yaml:
    get:
      operationId: openapiSpec
      summary: OpenAPI 3.1 specification
      tags: [system]
      responses:
        "200":
          description: OpenAPI spec in YAML
          content:
            application/yaml:
              schema:
                type: string

  /docs:
    get:
      operationId: apiDocs
      summary: Interactive API reference (Scalar UI)
      tags: [system]
      responses:
        "200":
          description: HTML page with interactive API docs
          content:
            text/html:
              schema:
                type: string

  /.well-known/oauth-protected-resource:
    get:
      operationId: oauthProtectedResource
      summary: MCP OAuth 2.0 Protected Resource Metadata
      description: RFC 8707 resource metadata required by the MCP authorization spec.
      tags: [system]
      responses:
        "200":
          description: Resource metadata
          content:
            application/json:
              schema:
                type: object

  /.well-known/agent-card.json:
    get:
      operationId: globalAgentCard
      summary: Global registry A2A Agent Card
      description: >
        Returns the Google A2A-compatible Agent Card for the registry itself,
        making the registry a first-class A2A citizen.
      tags: [agents]
      responses:
        "200":
          description: A2A Agent Card
          content:
            application/json:
              schema:
                type: object

  # ── Publishers ────────────────────────────────────────────────────────────

  /api/v1/publishers:
    get:
      operationId: listPublishers
      summary: List publishers
      tags: [publishers]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Paginated list of publishers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublisherList"
    post:
      operationId: createPublisher
      summary: Create a publisher (admin only)
      tags: [publishers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublisherRequest"
      responses:
        "201":
          description: Publisher created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publisher"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/publishers/{slug}:
    get:
      operationId: getPublisher
      summary: Get a publisher by slug
      tags: [publishers]
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Publisher detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publisher"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchPublisher
      summary: Update a publisher's metadata (admin only)
      tags: [publishers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Display name for the publisher
                contact:
                  type: string
                  description: Contact email or URL
      responses:
        "200":
          description: Updated publisher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publisher"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deletePublisher
      summary: Delete a publisher (admin only)
      description: Hard-deletes the publisher. Returns 409 if the publisher still owns active MCP servers or agents.
      tags: [publishers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: Publisher deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── MCP Servers ───────────────────────────────────────────────────────────

  /api/v1/mcp/servers:
    get:
      operationId: listMCPServers
      summary: List MCP servers
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - name: q
          in: query
          description: Full-text search query (prefix matching)
          schema:
            type: string
        - name: namespace
          in: query
          description: Filter by publisher slug
          schema:
            type: string
        - name: status
          in: query
          description: Filter by lifecycle status
          schema:
            type: string
            enum: [draft, published, deprecated]
        - name: visibility
          in: query
          description: Filter by visibility (admin only — public requests always see public entries only)
          schema:
            type: string
            enum: [public, private]
        - name: transport
          in: query
          description: Filter by transport type of the latest published version's packages
          schema:
            type: string
            enum: [stdio, sse, streamable_http]
        - name: registry_type
          in: query
          description: Filter by package registry/ecosystem type (e.g. npm, pip, docker)
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order for results (ignored when q is provided — search results are ranked by relevance)
          schema:
            type: string
            enum: [created_at_desc, updated_at_desc, published_at_desc, name_asc, name_desc]
            default: created_at_desc
        - name: featured
          in: query
          description: Filter by featured status
          schema:
            type: boolean
        - name: tag
          in: query
          description: Filter by tag (exact match, single tag)
          schema:
            type: string
        - name: published_since
          in: query
          description: Filter to entries whose latest version was published after this ISO 8601 date-time (e.g. 2025-01-01T00:00:00Z)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of MCP servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServerList"
    post:
      operationId: createMCPServer
      summary: Create an MCP server entry (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMCPServerRequest"
      responses:
        "201":
          description: MCP server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/mcp/servers/{namespace}/{slug}:
    get:
      operationId: getMCPServer
      summary: Get an MCP server by namespace/slug
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: MCP server detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServer"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchMCPServer
      summary: Update an MCP server's metadata (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                homepage_url:
                  type: string
                repo_url:
                  type: string
                license:
                  type: string
      responses:
        "200":
          description: Updated MCP server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteMCPServer
      summary: Soft-delete an MCP server (admin only)
      description: Sets the server and all its versions to status='deleted'. The entry is no longer returned in public listings.
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: MCP server deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers/{namespace}/{slug}/visibility:
    post:
      operationId: setMCPServerVisibility
      summary: Set MCP server visibility (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetVisibilityRequest"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  visibility:
                    type: string
                    enum: [public, private]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/mcp/servers/{namespace}/{slug}/deprecate:
    post:
      operationId: deprecateMCPServer
      summary: Deprecate an MCP server (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Server deprecated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/mcp/servers/{namespace}/{slug}/view:
    post:
      operationId: recordMCPServerView
      summary: Record a view event for an MCP server (fire-and-forget)
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: View recorded
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers/{namespace}/{slug}/copy:
    post:
      operationId: recordMCPServerCopy
      summary: Record a copy event for an MCP server (fire-and-forget)
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: Copy recorded
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers/{namespace}/{slug}/versions:
    get:
      operationId: listMCPServerVersions
      summary: List versions of an MCP server
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServerVersionList"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createMCPServerVersion
      summary: Create a new version of an MCP server (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMCPServerVersionRequest"
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServerVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/mcp/servers/{namespace}/{slug}/versions/{version}:
    get:
      operationId: getMCPServerVersion
      summary: Get a specific version of an MCP server
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServerVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers/{namespace}/{slug}/versions/{version}/publish:
    post:
      operationId: publishMCPServerVersion
      summary: Publish a version (admin only)
      description: >
        Transitions the version from draft to published. Published versions are
        immutable — metadata edits after publish are forbidden.
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      responses:
        "200":
          description: Version published
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: published
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Agents ────────────────────────────────────────────────────────────────

  /api/v1/agents:
    get:
      operationId: listAgents
      summary: List agents
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - name: q
          in: query
          description: Full-text search query (prefix matching)
          schema:
            type: string
        - name: namespace
          in: query
          description: Filter by publisher slug
          schema:
            type: string
        - name: status
          in: query
          description: Filter by lifecycle status
          schema:
            type: string
            enum: [draft, published, deprecated]
        - name: visibility
          in: query
          description: Filter by visibility (admin only)
          schema:
            type: string
            enum: [public, private]
        - name: sort
          in: query
          description: Sort order for results (ignored when q is provided — search results are ranked by relevance)
          schema:
            type: string
            enum: [created_at_desc, updated_at_desc, published_at_desc, name_asc, name_desc]
            default: created_at_desc
        - name: featured
          in: query
          description: Filter by featured status
          schema:
            type: boolean
        - name: tag
          in: query
          description: Filter by tag (exact match, single tag)
          schema:
            type: string
        - name: published_since
          in: query
          description: Filter to entries whose latest version was published after this ISO 8601 date-time (e.g. 2025-01-01T00:00:00Z)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
    post:
      operationId: createAgent
      summary: Create an agent entry (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/agents/{namespace}/{slug}:
    get:
      operationId: getAgent
      summary: Get an agent by namespace/slug
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchAgent
      summary: Update an agent's metadata (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteAgent
      summary: Soft-delete an agent (admin only)
      description: Sets the agent and all its versions to status='deleted'. The entry is no longer returned in public listings.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: Agent deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/{namespace}/{slug}/visibility:
    post:
      operationId: setAgentVisibility
      summary: Set agent visibility (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetVisibilityRequest"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  visibility:
                    type: string
                    enum: [public, private]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/agents/{namespace}/{slug}/deprecate:
    post:
      operationId: deprecateAgent
      summary: Deprecate an agent (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Agent deprecated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/agents/{namespace}/{slug}/view:
    post:
      operationId: recordAgentView
      summary: Record a view event for an agent (fire-and-forget)
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: View recorded
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/{namespace}/{slug}/copy:
    post:
      operationId: recordAgentCopy
      summary: Record a copy event for an agent (fire-and-forget)
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "204":
          description: Copy recorded
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/{namespace}/{slug}/versions:
    get:
      operationId: listAgentVersions
      summary: List versions of an agent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersionList"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createAgentVersion
      summary: Create a new version of an agent (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentVersionRequest"
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/agents/{namespace}/{slug}/versions/{version}:
    get:
      operationId: getAgentVersion
      summary: Get a specific version of an agent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/{namespace}/{slug}/versions/{version}/publish:
    post:
      operationId: publishAgentVersion
      summary: Publish an agent version (admin only)
      description: >
        Transitions the version from draft to published. Published versions are
        immutable — metadata edits after publish are forbidden.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      responses:
        "200":
          description: Version published
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: published
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/agents/{namespace}/{slug}/versions/{version}/status:
    patch:
      operationId: patchAgentVersionStatus
      summary: Update agent version lifecycle status (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchVersionStatusRequest"
      responses:
        "200":
          description: Status updated; returns the updated version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Per-agent A2A card ────────────────────────────────────────────────────

  /agents/{namespace}/{slug}/.well-known/agent-card.json:
    get:
      operationId: getAgentCard
      summary: A2A Agent Card
      description: Returns the Google A2A-compatible Agent Card for the given agent.
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: A2A Agent Card
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Stats & Audit ─────────────────────────────────────────────────────────

  /api/v1/public-stats:
    get:
      operationId: getPublicStats
      summary: Public registry statistics (published entries only)
      tags: [system]
      responses:
        "200":
          description: Public counts for each resource type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"

  /api/v1/changelog:
    get:
      operationId: getChangelog
      summary: Recently published versions across MCP servers and agents
      description: >
        Aggregated timeline of version publications, newest first. Only
        published versions of public, non-deleted entries are returned.
      tags: [system]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Recent version publications across the registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangelogList"

  /api/v1/stats:
    get:
      operationId: getStats
      summary: Registry resource counts (admin only)
      tags: [system]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Total counts for each resource type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistryCounts"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/audit:
    get:
      operationId: listAuditEvents
      summary: List audit log events (admin only)
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: resource_type
          in: query
          description: Filter by resource type (mcp_server, agent, publisher)
          schema:
            type: string
        - name: resource_id
          in: query
          description: Filter by resource ULID
          schema:
            type: string
        - name: actor
          in: query
          description: Filter by Keycloak subject UUID
          schema:
            type: string
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Paginated list of audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/reports:
    post:
      operationId: createReport
      summary: File a community issue report
      description: >
        Public, rate-limited endpoint for anyone to report problems with a
        registry entry (broken packaging, misleading description, spam,
        security concern, etc.). Admins triage reports via the admin queue.
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      operationId: listReports
      summary: List community issue reports (admin only)
      tags: [reports]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [pending, reviewed, dismissed]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/reports/{id}:
    patch:
      operationId: updateReportStatus
      summary: Update a report's status (admin only)
      tags: [reports]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, reviewed, dismissed]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── v0 MCP registry wire-format ───────────────────────────────────────────

  /v0/servers:
    get:
      operationId: v0ListServers
      summary: List MCP servers (MCP registry wire format)
      description: >
        Returns the paginated server list in the canonical MCP registry wire
        format. Only public, published servers are returned.
      tags: [v0]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Full-text search (also accepts "q" for legacy compat)
          schema:
            type: string
        - name: updated_since
          in: query
          description: Return servers updated after this RFC 3339 timestamp
          schema:
            type: string
            format: date-time
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
        - name: version
          in: query
          description: Exact semver filter, or "latest"
          schema:
            type: string
      responses:
        "200":
          description: Paginated server list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ListResponse"

  /v0/servers/{id}:
    get:
      operationId: v0GetServer
      summary: Get an MCP server by ULID (MCP registry wire format)
      tags: [v0]
      parameters:
        - $ref: "#/components/parameters/ServerIDParam"
      responses:
        "200":
          description: Server detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ServerResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"

  /v0/servers/{namespace}/{slug}:
    get:
      operationId: v0GetServerByName
      summary: Get an MCP server by namespace/slug (MCP registry wire format)
      tags: [v0]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Server detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ServerResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"

  /v0/servers/{namespace}/{slug}/versions:
    get:
      operationId: v0ListServerVersions
      summary: List published versions of an MCP server (MCP registry wire format)
      tags: [v0]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: List of published versions in wire format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ListResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"

  /v0/servers/{namespace}/{slug}/versions/{version}:
    get:
      operationId: v0GetServerVersion
      summary: Get a specific version of an MCP server (MCP registry wire format)
      description: Use `latest` as the version value to get the latest published version.
      tags: [v0]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      responses:
        "200":
          description: Version detail in wire format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ServerResponse"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"
    put:
      operationId: v0UpdateServerVersion
      summary: Update a server version (admin only) — not yet implemented
      tags: [v0]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: v0DeleteServerVersion
      summary: Delete a server version (admin only) — not yet implemented
      tags: [v0]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v0/servers/{namespace}/{slug}/status:
    patch:
      operationId: v0PatchServerStatus
      summary: Update status for all published versions of a server (admin only)
      tags: [v0]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V0StatusPatchRequest"
      responses:
        "200":
          description: All versions updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0AllVersionsStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"

  /v0/servers/{namespace}/{slug}/versions/{version}/status:
    patch:
      operationId: v0PatchVersionStatus
      summary: Update status of a specific server version (admin only)
      tags: [v0]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/VersionParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V0StatusPatchRequest"
      responses:
        "200":
          description: Version status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ServerResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Server or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"

  /v0/publish:
    post:
      operationId: v0Publish
      summary: Publish an MCP server version (admin only, MCP registry wire format)
      description: >
        Creates or updates an MCP server entry and immediately publishes a
        version. The request body is the server.json shape directly (no wrapper).
        Auto-creates the server record if the publisher exists.
      tags: [v0]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V0PublishRequest"
      responses:
        "200":
          description: Server published; returns the full ServerResponse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0ServerResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V0Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
    NamespaceParam:
      name: namespace
      in: path
      required: true
      schema:
        type: string
    VersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
    ServerIDParam:
      name: id
      in: path
      required: true
      description: ULID of the MCP server
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CursorParam:
      name: cursor
      in: query
      schema:
        type: string

  schemas:
    # ── System ──────────────────────────────────────────────────────────────

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        error:
          type: string

    StatusBreakdown:
      type: object
      properties:
        draft:
          type: integer
        published:
          type: integer
        deprecated:
          type: integer

    RegistryCounts:
      type: object
      required: [mcp_servers, agents, publishers]
      properties:
        mcp_servers:
          type: integer
        agents:
          type: integer
        publishers:
          type: integer
        mcp_status_breakdown:
          $ref: "#/components/schemas/StatusBreakdown"
        agent_status_breakdown:
          $ref: "#/components/schemas/StatusBreakdown"

    PublicStats:
      type: object
      required:
        - mcp_servers
        - agents
        - publishers
        - new_mcp_servers_this_week
        - new_agents_this_week
        - new_publishers_this_week
      properties:
        mcp_servers:
          type: integer
          description: Total public published MCP servers
        agents:
          type: integer
          description: Total public published agents
        publishers:
          type: integer
          description: Total publishers with at least one public entry
        new_mcp_servers_this_week:
          type: integer
          description: MCP servers published in the last 7 days
        new_agents_this_week:
          type: integer
          description: Agents published in the last 7 days
        new_publishers_this_week:
          type: integer
          description: Publishers with at least one public entry that were created in the last 7 days

    # ── Publishers ──────────────────────────────────────────────────────────

    Publisher:
      type: object
      required: [id, slug, name, verified, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
        slug:
          type: string
        name:
          type: string
        contact:
          type: string
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePublisherRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        name:
          type: string
        contact:
          type: string

    PublisherList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Publisher"
        next_cursor:
          type: string
        total_count:
          type: integer

    # ── MCP Servers ─────────────────────────────────────────────────────────

    PackageTransport:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [stdio, http, sse, streamable_http]
        url:
          type: string

    PackageEntry:
      type: object
      required: [registryType, identifier, version, transport]
      properties:
        registryType:
          type: string
        registryBaseUrl:
          type: string
        identifier:
          type: string
        version:
          type: string
        transport:
          $ref: "#/components/schemas/PackageTransport"

    MCPTool:
      type: object
      description: >
        Publisher-declared tool exposed by an MCP server. This is a registry
        extension — the MCP spec itself returns the live tool list at runtime
        via the `tools/list` method. Storing the declared list here lets the
        UI show tool counts and descriptions without connecting to a running
        server. Structural requirements: `name` is required and unique within
        the enclosing array; `input_schema`, if present, must be a JSON
        Schema object.
      required: [name]
      properties:
        name:
          type: string
          description: Unique tool name within the server
        description:
          type: string
          description: Human-readable tool description
        input_schema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the tool's input arguments
        annotations:
          type: object
          additionalProperties: true
          description: MCP spec tool annotations (e.g. destructive, idempotent)

    MCPServerLatestVersion:
      type: object
      required: [version, runtime, protocol_version]
      properties:
        version:
          type: string
        runtime:
          type: string
          enum: [stdio, http, sse, streamable_http]
        protocol_version:
          type: string
        packages:
          type: array
          items:
            $ref: "#/components/schemas/PackageEntry"
        capabilities:
          type: object
          additionalProperties: true
          description: >
            MCP capability-negotiation object (e.g. `{tools:{listChanged:true}}`).
            NOT a list of tools — see the `tools` field for that.
        tools:
          type: array
          description: Publisher-declared list of tools this server exposes.
          items:
            $ref: "#/components/schemas/MCPTool"
        published_at:
          type: string
          format: date-time

    MCPServer:
      type: object
      required: [id, namespace, slug, name, visibility, status, created_at, updated_at]
      properties:
        id:
          type: string
        namespace:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        homepage_url:
          type: string
        repo_url:
          type: string
        license:
          type: string
        visibility:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [draft, published, deprecated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        featured:
          type: boolean
          default: false
        verified:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string
        readme:
          type: string
          description: Long-form README content (Markdown)
        view_count:
          type: integer
          description: Number of times this server has been viewed
        copy_count:
          type: integer
          description: Number of times this server's config has been copied
        latest_version:
          $ref: "#/components/schemas/MCPServerLatestVersion"

    CreateMCPServerRequest:
      type: object
      required: [namespace, slug, name]
      properties:
        namespace:
          type: string
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        name:
          type: string
        description:
          type: string
        homepage_url:
          type: string
        repo_url:
          type: string
        license:
          type: string

    MCPServerList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MCPServer"
        next_cursor:
          type: string
        total_count:
          type: integer

    MCPServerVersion:
      type: object
      required: [id, version, runtime, protocol_version, status, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
        version:
          type: string
          description: Semver string (e.g. 1.2.3)
        runtime:
          type: string
          enum: [stdio, http, sse, streamable_http]
        protocol_version:
          type: string
        packages:
          type: array
          items:
            $ref: "#/components/schemas/PackageEntry"
        capabilities:
          type: object
          additionalProperties: true
        tools:
          type: array
          description: Publisher-declared list of tools this server exposes.
          items:
            $ref: "#/components/schemas/MCPTool"
        checksum:
          type: string
        signature:
          type: string
        status:
          type: string
          enum: [draft, published, deprecated]
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MCPServerVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MCPServerVersion"

    CreateMCPServerVersionRequest:
      type: object
      required: [version, runtime, protocol_version]
      properties:
        version:
          type: string
          description: Semver string (e.g. 1.2.3)
        runtime:
          type: string
          enum: [stdio, http, sse, streamable_http]
        protocol_version:
          type: string
        packages:
          type: array
          items:
            $ref: "#/components/schemas/PackageEntry"
        capabilities:
          type: object
          additionalProperties: true
        tools:
          type: array
          description: Publisher-declared list of tools this server exposes.
          items:
            $ref: "#/components/schemas/MCPTool"
        checksum:
          type: string
        signature:
          type: string

    # ── Agents ──────────────────────────────────────────────────────────────

    AgentSkill:
      type: object
      required: [id, name, description, tags]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        examples:
          type: array
          items:
            type: string

    AgentLatestVersion:
      type: object
      required: [version, endpoint_url]
      properties:
        version:
          type: string
        endpoint_url:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkill"
        default_input_modes:
          type: array
          items:
            type: string
        default_output_modes:
          type: array
          items:
            type: string
        authentication:
          type: array
          items:
            type: object
        protocol_version:
          type: string
        published_at:
          type: string
          format: date-time

    Agent:
      type: object
      required: [id, namespace, slug, name, visibility, status, created_at, updated_at]
      properties:
        id:
          type: string
        namespace:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [draft, published, deprecated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        featured:
          type: boolean
          default: false
        verified:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string
        readme:
          type: string
          description: Long-form README content (Markdown)
        view_count:
          type: integer
          description: Number of times this agent has been viewed
        copy_count:
          type: integer
          description: Number of times this agent's config has been copied
        latest_version:
          $ref: "#/components/schemas/AgentLatestVersion"

    CreateAgentRequest:
      type: object
      required: [namespace, slug, name]
      properties:
        namespace:
          type: string
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        name:
          type: string
        description:
          type: string

    AgentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        next_cursor:
          type: string
        total_count:
          type: integer

    AgentVersion:
      type: object
      required: [id, version, endpoint_url, status, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
        version:
          type: string
        endpoint_url:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkill"
        capabilities:
          type: object
          additionalProperties: true
        authentication:
          type: array
          items:
            type: object
        default_input_modes:
          type: array
          items:
            type: string
        default_output_modes:
          type: array
          items:
            type: string
        provider:
          type: object
          additionalProperties: true
        documentation_url:
          type: string
        icon_url:
          type: string
        protocol_version:
          type: string
        status:
          type: string
          enum: [draft, published, deprecated]
        status_message:
          type: string
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AgentVersion"

    CreateAgentVersionRequest:
      type: object
      required: [version, endpoint_url]
      properties:
        version:
          type: string
        endpoint_url:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkill"
        capabilities:
          type: object
          additionalProperties: true
        authentication:
          type: array
          items:
            type: object
        default_input_modes:
          type: array
          items:
            type: string
        default_output_modes:
          type: array
          items:
            type: string
        provider:
          type: object
          additionalProperties: true
        documentation_url:
          type: string
        icon_url:
          type: string
        protocol_version:
          type: string

    PatchVersionStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, deprecated, deleted]
        statusMessage:
          type: string
          description: Required when status is deprecated or deleted; must be absent when active.

    SetVisibilityRequest:
      type: object
      required: [visibility]
      properties:
        visibility:
          type: string
          enum: [public, private]

    # ── Audit ───────────────────────────────────────────────────────────────

    AuditEvent:
      type: object
      required: [id, actor_subject, actor_email, action, resource_type, resource_id, created_at]
      properties:
        id:
          type: string
          description: ULID
        actor_subject:
          type: string
          description: Keycloak subject UUID
        actor_email:
          type: string
        action:
          type: string
          description: Action performed (e.g. mcp_server.created)
        resource_type:
          type: string
        resource_id:
          type: string
        resource_ns:
          type: string
        resource_slug:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    AuditEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        next_cursor:
          type: string

    ChangelogEntry:
      type: object
      required: [resource_type, namespace, slug, name, version, published_at]
      properties:
        resource_type:
          type: string
          enum: [mcp_server, agent]
        namespace:
          type: string
        slug:
          type: string
        name:
          type: string
        version:
          type: string
        published_at:
          type: string
          format: date-time

    ChangelogList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChangelogEntry"

    Report:
      type: object
      required: [id, resource_type, resource_id, issue_type, description, status, created_at]
      properties:
        id:
          type: string
          description: ULID
        resource_type:
          type: string
          enum: [mcp_server, agent]
        resource_id:
          type: string
          description: ULID of the reported resource
        issue_type:
          type: string
          enum: [broken, misleading, spam, security, licensing, outdated, duplicate, other]
        description:
          type: string
          minLength: 5
          maxLength: 4000
        status:
          type: string
          enum: [pending, reviewed, dismissed]
        reporter_ip:
          type: string
          description: Admin-only — only present in list responses for authenticated admins
        created_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        reviewed_by:
          type: string
          description: Admin-only — subject UUID of the reviewer

    ReportList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Report"

    CreateReportRequest:
      type: object
      required: [resource_type, resource_id, issue_type, description]
      properties:
        resource_type:
          type: string
          enum: [mcp_server, agent]
        resource_id:
          type: string
        issue_type:
          type: string
          enum: [broken, misleading, spam, security, licensing, outdated, duplicate, other]
        description:
          type: string
          minLength: 5
          maxLength: 4000

    UpdateReportStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, reviewed, dismissed]

    # ── v0 wire format ──────────────────────────────────────────────────────

    V0Repository:
      type: object
      required: [url]
      properties:
        url:
          type: string
        source:
          type: string
          description: e.g. "github", "gitlab"
        subfolder:
          type: string
        id:
          type: string

    V0ServerDetail:
      type: object
      required: [name, description]
      properties:
        id:
          type: string
          description: ULID of the registry entry
        name:
          type: string
          description: "namespace/slug (e.g. acme/my-server)"
        description:
          type: string
        title:
          type: string
        version:
          type: string
        packages:
          type: array
          items:
            $ref: "#/components/schemas/PackageEntry"
        capabilities:
          type: object
          additionalProperties: true
        repository:
          $ref: "#/components/schemas/V0Repository"
        websiteUrl:
          type: string

    V0OfficialMeta:
      type: object
      properties:
        status:
          type: string
          enum: [active, deprecated, deleted, draft]
        statusMessage:
          type: string
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        statusChangedAt:
          type: string
          format: date-time
        isLatest:
          type: boolean

    V0ServerResponse:
      type: object
      required: [server, _meta]
      properties:
        server:
          $ref: "#/components/schemas/V0ServerDetail"
        _meta:
          type: object
          properties:
            io.modelcontextprotocol.registry/official:
              $ref: "#/components/schemas/V0OfficialMeta"

    V0ListMetadata:
      type: object
      required: [count]
      properties:
        count:
          type: integer
        nextCursor:
          type: string

    V0ListResponse:
      type: object
      required: [servers, metadata]
      properties:
        servers:
          type: array
          items:
            $ref: "#/components/schemas/V0ServerResponse"
        metadata:
          $ref: "#/components/schemas/V0ListMetadata"

    V0StatusPatchRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, deprecated, deleted]
        statusMessage:
          type: string

    V0AllVersionsStatusResponse:
      type: object
      required: [updatedCount, servers]
      properties:
        updatedCount:
          type: integer
        servers:
          type: array
          items:
            $ref: "#/components/schemas/V0ServerResponse"

    V0PublishRequest:
      type: object
      required: [name, description, version, protocolVersion]
      properties:
        name:
          type: string
          description: "namespace/slug (e.g. acme/my-server)"
          pattern: "^[a-zA-Z0-9.-]+/[a-zA-Z0-9._-]+$"
        description:
          type: string
        version:
          type: string
        title:
          type: string
        protocolVersion:
          type: string
        packages:
          type: array
          items:
            $ref: "#/components/schemas/PackageEntry"
        capabilities:
          type: object
          additionalProperties: true
        repository:
          $ref: "#/components/schemas/V0Repository"
        websiteUrl:
          type: string

    V0Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Error (RFC 7807) ────────────────────────────────────────────────────

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Authenticated but lacks required scope
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Duplicate slug or version
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ValidationError:
      description: Request body failed schema validation
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

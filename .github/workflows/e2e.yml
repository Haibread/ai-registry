name: E2E Tests

# Run on every push to main and on every pull-request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # actions/upload-artifact@v5 still bundles Node.js 20. GitHub is force-cutting
  # Node 20 runners on June 2, 2026; this env var opts the action into the
  # Node 24 runner early. See .github/workflows/publish.yml for the same
  # escape hatch used for the docker/* actions.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # docker-compose.yml references an env_file but all values have inline
      # defaults, so an empty file is sufficient for CI.
      - name: Create deploy/.env
        run: touch deploy/.env

      # Build images and start all four services (postgres, keycloak, server, web).
      # docker-compose.ci.yml overrides depends_on conditions to service_started
      # so this command returns immediately without blocking on Keycloak's slow
      # JVM startup. The wait steps below own the readiness gates.
      - name: Start stack
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      # Keycloak takes the longest to start (60 s start_period in the healthcheck).
      # Poll the realm discovery endpoint rather than relying on docker healthcheck
      # timing, which is conservative.
      # Keycloak is a JVM app — it can take 90-120 s to boot on a CI runner.
      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak realm..."
          timeout 240 bash -c \
            'until curl -sf http://localhost:8080/realms/ai-registry > /dev/null; do
               echo "  not ready, retrying in 5 s..."; sleep 5
             done'
          echo "Keycloak ready."

      - name: Wait for Go server
        run: |
          echo "Waiting for Go server..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:8081/readyz > /dev/null; do
               echo "  not ready, retrying in 3 s..."; sleep 3
             done'
          echo "Server ready."

      - name: Wait for web (nginx)
        run: |
          echo "Waiting for nginx..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:3000/ > /dev/null; do
               echo "  not ready, retrying in 3 s..."; sleep 3
             done'
          echo "Web ready."

      # Fast smoke test against the public read surface — catches gross
      # regressions (5xx, missing routes, latency spikes) before the slower
      # Playwright suite runs. Uses Grafana's official setup action so we
      # avoid the apt/gpg dance. Thresholds live in the script itself.
      - name: Set up k6
        uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2 # v1

      - name: Run k6 smoke
        uses: grafana/run-k6-action@a15e2072ede004e8d46141e33d7f7dad8ad08d9d # v1
        env:
          BASE_URL: http://localhost:3000
        with:
          path: test/load/smoke.js

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      # Only install Chromium — the tests target chromium-only projects.
      - name: Install Playwright + Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: web
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: admin
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      # Dump all container logs on failure to speed up debugging.
      - name: Dump docker logs
        if: failure()
        working-directory: deploy
        run: docker compose -f docker-compose.yml logs --no-color

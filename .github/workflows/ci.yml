name: CI

# Fast-running quality gates for pull requests. Runs in parallel with the
# slower e2e workflow; both must pass to merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of this workflow for the same ref. Pushing a new
# commit to a PR supersedes the previous run; keeping only the latest saves
# runner minutes and prevents stale green/red statuses from racing.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secret scanning ──────────────────────────────────────────────────────────
  # Scans the diff (on PRs) or the whole history (on push to main) for leaked
  # credentials. Runs early and fast so a bad commit is caught before the
  # heavier jobs waste runner minutes.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # gitleaks needs full history on push events to detect secrets
          # introduced in older commits; shallow is fine for pull_request
          # because the action auto-diffs against the base ref.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Exit non-zero on any finding.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  # ── Go server: vet, build, unit + integration tests ───────────────────────────
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: go vet
        working-directory: server
        run: go vet ./...

      - name: go build
        working-directory: server
        run: go build ./...

      # testcontainers-go spins up Postgres automatically via the Docker daemon
      # that GitHub-hosted runners provide out of the box.
      - name: go test
        working-directory: server
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      # Explicit conformance + contract suite run. Everything under this step
      # already ran as part of `go test ./...` above — the repeat is deliberate
      # so the CI log surfaces these tests by name. If the /v0/ wire-format
      # conformance, A2A Agent Card schema, OpenAPI↔router contract, or the
      # admin-guard router contract are ever deleted or renamed without
      # updating this step, CI fails loudly instead of silently passing.
      - name: Contract & conformance suites (named)
        working-directory: server
        run: |
          set -euo pipefail
          go test -count=1 -v \
            -run '^(TestV0Conformance_|TestAgentCardHandler_PerAgentCard_A2AConformance$|TestAgentCardHandler_GlobalAgentCard_A2AConformance$|TestAgentCardHandler_GlobalAgentCard_MisconfiguredReturns500$|TestRegistryCard_A2AConformance$)' \
            ./internal/http/handlers/...
          go test -count=1 -v \
            -run '^(TestOpenAPIContract_MatchesRouter$|TestAllWriteRoutesRequireAdmin$|TestPublicWriteRoutesBypassAdmin$)' \
            ./internal/http/

      # Coverage floor — catches silent test deletions that drop overall
      # coverage without anything else noticing. The floor is intentionally
      # below the current number so normal development doesn't bounce off
      # it; the goal is to detect regressions, not to gate every PR on a
      # moving target. Raise this value when the real number climbs so the
      # gate keeps providing signal.
      - name: Coverage floor
        working-directory: server
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          floor=70.0
          awk -v t="$total" -v f="$floor" 'BEGIN { exit (t+0 >= f+0) ? 0 : 1 }' || {
            echo "::error::Go coverage ${total}% is below the floor of ${floor}%"
            exit 1
          }

  # ── OpenAPI ↔ router contract ────────────────────────────────────────────────
  # Dedicated, fast job that only runs the OpenAPI↔router and A2A Agent Card
  # conformance suites. Duplicates what the server job covers, but surfaces
  # the result as its own required check so a spec drift is obvious in the
  # PR UI without digging into a long log.
  contract:
    name: API contract (OpenAPI + A2A)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run contract & conformance tests
        working-directory: server
        run: |
          set -euo pipefail
          go test -count=1 -v \
            -run '^(TestOpenAPIContract_MatchesRouter$|TestAllWriteRoutesRequireAdmin$|TestPublicWriteRoutesBypassAdmin$)' \
            ./internal/http/
          go test -count=1 -v \
            -run '^(TestV0Conformance_|TestAgentCardHandler_PerAgentCard_A2AConformance$|TestAgentCardHandler_GlobalAgentCard_A2AConformance$|TestAgentCardHandler_GlobalAgentCard_MisconfiguredReturns500$|TestRegistryCard_A2AConformance$)' \
            ./internal/http/handlers/...

  # ── Web: lint, typecheck, unit tests ─────────────────────────────────────────
  web:
    name: Web (Vite + React)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # Generate TypeScript types from the OpenAPI spec before typecheck/lint
      # so src/lib/schema.d.ts exists (it's gitignored).
      - name: Generate OpenAPI types
        working-directory: web
        run: npm run generate

      - name: Lint
        working-directory: web
        run: npm run lint

      # `npm run build` runs `tsc -b && vite build`; vitest doesn't typecheck,
      # so the build step is the authoritative typecheck gate.
      - name: Typecheck + build
        working-directory: web
        run: npm run build

      - name: Unit tests
        working-directory: web
        run: npm test

  # ── Helm chart: lint + template rendering ────────────────────────────────────
  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest

      - name: helm lint
        run: helm lint deploy/helm/ai-registry

      # Render with default values and with each optional feature enabled, so
      # template errors in opt-in paths (httpRoute, cnpg, bootstrap) fail CI.
      - name: helm template (defaults)
        run: helm template test deploy/helm/ai-registry

      - name: helm template (httpRoute)
        run: |
          helm template test deploy/helm/ai-registry \
            --set httpRoute.enabled=true \
            --set httpRoute.gatewayRef.name=test-gateway

      - name: helm template (cnpg)
        run: |
          helm template test deploy/helm/ai-registry \
            --set cnpg.enabled=true

      - name: helm template (bootstrap sample data)
        run: |
          helm template test deploy/helm/ai-registry \
            --set server.bootstrap.enabled=true \
            --set server.bootstrap.sampleData=true

      # Schema-validate the rendered Kubernetes manifests. helm lint catches
      # chart-authoring issues but not bad spec fields; kubeconform checks
      # every rendered manifest against the published Kubernetes OpenAPI
      # schemas. Includes the CNPG and Prometheus Operator CRD schemas so
      # opt-in paths validate too.
      - name: Install kubeconform
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xzf - kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: kubeconform (defaults)
        run: |
          helm template test deploy/helm/ai-registry \
            | kubeconform -strict -summary -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: kubeconform (all opt-ins)
        run: |
          helm template test deploy/helm/ai-registry \
            --set httpRoute.enabled=true \
            --set httpRoute.gatewayRef.name=test-gateway \
            --set cnpg.enabled=true \
            --set server.bootstrap.enabled=true \
            --set server.bootstrap.sampleData=true \
            --set server.serviceMonitor.enabled=true \
            --set server.podDisruptionBudget.enabled=true \
            --set web.podDisruptionBudget.enabled=true \
            | kubeconform -strict -summary -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

name: Publish

# Publishes Docker images and the Helm chart to GHCR.
#
# Triggers:
#   push to main  → images tagged :latest + :main-<short-sha>
#                   chart version  0.0.0-main.<short-sha>
#   push of v* tag → images tagged :<semver> + :<major>.<minor>
#                   chart version  <semver-without-v>

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

# Serialise publishes per ref. Two pushes to main that race would otherwise
# both compete to overwrite :latest; with cancel-in-progress=false the later
# build queues behind the earlier one instead of clobbering it.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # OCI registry paths must be all-lowercase; lowercasing is applied per-job
  # via a dedicated step that overwrites IMAGE_PREFIX in $GITHUB_ENV.
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-registry
  # docker/build-push-action, docker/login-action, and docker/metadata-action
  # still bundle Node.js 20. GitHub is force-cutting Node 20 runners on
  # June 2, 2026; this env var opts those actions into the Node 24 runner
  # early (documented as the interim fix in the deprecation post until the
  # docker org ships Node-24-native bundles).
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Server image ─────────────────────────────────────────────────────────────
  build-server:
    name: Build & push server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase IMAGE_PREFIX
        run: echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/server
          tags: |
            # On semver tag: v1.2.3 → 1.2.3 and 1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On main branch: :latest + :main-<short-sha>
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}},format=short

      - name: Compute build metadata
        id: bmeta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          else
            VER="main-$(echo "${{ github.sha }}" | cut -c1-7)"
          fi
          {
            echo "version=${VER}"
            echo "commit=${{ github.sha }}"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.bmeta.outputs.version }}
            COMMIT=${{ steps.bmeta.outputs.commit }}
            BUILD_TIME=${{ steps.bmeta.outputs.build_time }}
          # BuildKit layer cache via GitHub Actions cache backend.
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ── Web image ─────────────────────────────────────────────────────────────────
  build-web:
    name: Build & push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase IMAGE_PREFIX
        run: echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}},format=short

      - name: Build and push web image
        id: build
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root so the Dockerfile can access both
          # web/ and server/ (for the OpenAPI spec used by type generation).
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Image vulnerability scan ─────────────────────────────────────────────────
  # Runs Trivy against both images after they are pushed. Results are uploaded
  # to GitHub's Code Scanning dashboard as SARIF so CVEs show up in the Security
  # tab and on PRs. Failures do not block the publish (continue-on-error) —
  # this is a detection gate, not a deploy gate. Tighten later by dropping the
  # flag once the baseline CVE count is at zero.
  scan-images:
    name: Scan images (Trivy)
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    permissions:
      contents: read
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image: [server, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase IMAGE_PREFIX
        run: echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image reference
        id: ref
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            TAG="${TAG#v}"
          else
            TAG="latest"
          fi
          echo "image=${IMAGE_PREFIX}/${{ matrix.image }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  # ── Helm chart ───────────────────────────────────────────────────────────────
  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Compute chart and app versions
        id: versions
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strip the leading 'v': Helm requires no prefix, and Docker images
            # are tagged without it (type=semver,pattern={{version}}).
            CHART_VERSION="${{ github.ref_name }}"
            CHART_VERSION="${CHART_VERSION#v}"
            APP_VERSION="${CHART_VERSION}"
          else
            BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            # 0.0.0 is a neutral SemVer base for non-release builds.
            # Helm requires valid SemVer; the pre-release segment carries the identity.
            CHART_VERSION="0.0.0-${BRANCH}.${SHORT_SHA}"
            APP_VERSION="${BRANCH}-${SHORT_SHA}"
          fi

          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}"     >> "$GITHUB_OUTPUT"

      # Rewrite Chart.yaml in place before packaging so that the tarball's
      # Chart.yaml reflects the real build version. `helm package` already
      # overrides these fields via --version / --app-version, but writing the
      # file too keeps `helm inspect` / `helm show chart` honest downstream
      # and avoids the stale "0.1.0 / latest" shipping inside the tarball.
      - name: Stamp Chart.yaml
        run: |
          sed -i -E \
            -e "s/^version:.*/version: ${{ steps.versions.outputs.chart_version }}/" \
            -e "s/^appVersion:.*/appVersion: \"${{ steps.versions.outputs.app_version }}\"/" \
            deploy/helm/ai-registry/Chart.yaml
          grep -E '^(version|appVersion):' deploy/helm/ai-registry/Chart.yaml

      - name: Package chart
        run: |
          helm package deploy/helm/ai-registry \
            --version     "${{ steps.versions.outputs.chart_version }}" \
            --app-version "${{ steps.versions.outputs.app_version }}" \
            --destination /tmp/chart

      - name: Push chart to GHCR
        run: |
          helm push /tmp/chart/*.tgz \
            oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ai-registry/charts

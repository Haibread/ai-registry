name: Publish

# Publishes Docker images and the Helm chart to GHCR.
#
# Triggers:
#   push to main  → images tagged :latest + :main-<short-sha>
#                   chart version  <chart-version>-main.<short-sha>
#   push of v* tag → images tagged :<semver> + :latest
#                   chart version  <semver-without-v>

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  # Images live under ghcr.io/<owner>/ai-registry/{server,web}
  # Chart lives under ghcr.io/<owner>/ai-registry/charts
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-registry

jobs:
  # ── Server image ─────────────────────────────────────────────────────────────
  build-server:
    name: Build & push server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/server
          tags: |
            # On semver tag: v1.2.3 → 1.2.3 and 1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On main branch: latest + main-<short-sha>
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}},format=short

      - name: Build and push server image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit layer cache via GitHub Actions cache backend.
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ── Web image ─────────────────────────────────────────────────────────────────
  build-web:
    name: Build & push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}},format=short

      - name: Build and push web image
        id: build
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root so the Dockerfile can access both
          # web/ and api/ (for the OpenAPI spec used by type generation).
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Helm chart ───────────────────────────────────────────────────────────────
  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Compute chart and app versions
        id: versions
        run: |
          # Read the base chart version from Chart.yaml.
          CHART_BASE=$(grep '^version:' deploy/helm/ai-registry/Chart.yaml | awk '{print $2}')

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strip the leading 'v' for SemVer chart version (Helm requires no prefix).
            CHART_VERSION="${{ github.ref_name }}"
            CHART_VERSION="${CHART_VERSION#v}"
            APP_VERSION="${{ github.ref_name }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            CHART_VERSION="${CHART_BASE}-main.${SHORT_SHA}"
            APP_VERSION="main-${SHORT_SHA}"
          fi

          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}"     >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          helm package deploy/helm/ai-registry \
            --version     "${{ steps.versions.outputs.chart_version }}" \
            --app-version "${{ steps.versions.outputs.app_version }}" \
            --destination /tmp/chart

      - name: Push chart to GHCR
        run: |
          helm push /tmp/chart/*.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/ai-registry/charts

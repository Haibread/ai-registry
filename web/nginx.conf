# JSON access log format.
# Defined at http-context level (files in /etc/nginx/conf.d are included
# inside http{}, so top-level directives here land there). Log aggregators
# (Loki, ELK, Cloud Logging) can ingest JSON without bespoke parsers.
log_format json_main escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent"'
  '}';

server {
    # Port 8080: non-root processes cannot bind to ports < 1024.
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log json_main;

    # ── Security headers ──────────────────────────────────────────────────
    # Defined at server level so every location inherits them. nginx only
    # resets add_header inheritance when the child location declares its own
    # add_header, which is why caching below uses `expires` (a separate
    # directive) rather than `add_header Cache-Control …`. HSTS has no effect
    # over plain HTTP — it activates once an HTTPS ingress fronts this pod.
    # CSP is deliberately permissive for inline/eval because Vite bundles
    # still need both; tighten via hashes/nonces when the bundle is audited.
    # connect-src additionally allows http://localhost:* so that docker-compose
    # and CI runs (where Keycloak is served at http://localhost:8080) can
    # complete OIDC discovery from the SPA. Prod is fronted by HTTPS, where
    # browsers block mixed-content http: connections regardless of CSP, so
    # this allowance has no effect on deployed environments.
    add_header X-Frame-Options            "SAMEORIGIN"                                       always;
    add_header X-Content-Type-Options     "nosniff"                                          always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"                  always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"         always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains"              always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss: http://localhost:*; font-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;

    # Proxy API and server-side routes to the Go backend.
    # API_URL is injected at container startup via envsubst.
    # In docker-compose: http://server:8081
    # In Kubernetes: http://<release>-server:<port> (set by Helm ConfigMap)
    # Note: in Kubernetes these paths are handled by the Ingress/HTTPRoute
    # before reaching nginx, so these blocks act as a fallback only.

    location /api/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v0/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy only the A2A Agent Card well-known path to the backend. All other
    # /agents/* paths are React Router client-side routes (the list page at
    # /agents and the detail page at /agents/{ns}/{slug}) and must fall through
    # to the SPA catch-all. A prefix match on /agents/ would swallow them and
    # return a 404 from the backend for every direct-link navigation.
    location ~ ^/agents/[^/]+/[^/]+/\.well-known/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /healthz {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /readyz {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /metrics {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /.well-known/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.yaml {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Runtime SPA configuration — OIDC issuer and client ID.
    # The browser SPA fetches this before initialising the OIDC client so
    # that these values are not baked into the JavaScript bundle at build time.
    location /config.json {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Vite hashes filenames under /assets (e.g. index-abc123.js), so these
    # are safe to cache for a year. The SPA shell (/index.html) changes on
    # every deploy and must revalidate — otherwise users pin an old build
    # that references deleted asset hashes.
    location ^~ /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # SPA catch-all: serve index.html for all other paths.
    # Use only $uri (not $uri/) to avoid an internal redirect to /agents/ which
    # would match the location /agents/ proxy block above and hit the backend.
    # `expires -1` sends `Cache-Control: no-cache` — the browser MUST revalidate
    # before using a cached copy but may still keep it for conditional GETs.
    location / {
        expires -1;
        try_files $uri /index.html;
    }
}

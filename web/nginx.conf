server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and server-side routes to the Go backend.
    # In docker-compose the backend is reachable via the "server" hostname.
    # In Kubernetes these paths are handled by the Ingress before reaching
    # nginx, so this block is a no-op there.

    location /api/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v0/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /agents/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /readyz {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /.well-known/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /openapi.yaml {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    # Runtime SPA configuration — OIDC issuer and client ID.
    # The browser SPA fetches this before initialising the OIDC client so
    # that these values are not baked into the JavaScript bundle at build time.
    location /config.json {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    # SPA catch-all: serve index.html for all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}

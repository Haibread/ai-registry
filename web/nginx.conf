server {
    # Port 8080: non-root processes cannot bind to ports < 1024.
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and server-side routes to the Go backend.
    # API_URL is injected at container startup via envsubst.
    # In docker-compose: http://server:8081
    # In Kubernetes: http://<release>-server:<port> (set by Helm ConfigMap)
    # Note: in Kubernetes these paths are handled by the Ingress/HTTPRoute
    # before reaching nginx, so these blocks act as a fallback only.

    location /api/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v0/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /agents/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /healthz {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /readyz {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /metrics {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /.well-known/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.yaml {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Runtime SPA configuration — OIDC issuer and client ID.
    # The browser SPA fetches this before initialising the OIDC client so
    # that these values are not baked into the JavaScript bundle at build time.
    location /config.json {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA catch-all: serve index.html for all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}

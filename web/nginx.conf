server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the server
    location /api/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v0/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /agents/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /readyz {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /.well-known/ {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    location /openapi.yaml {
        proxy_pass http://server:8081;
        proxy_set_header Host $host;
    }

    # SPA catch-all: serve index.html for all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}

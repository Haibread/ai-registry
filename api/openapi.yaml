openapi: 3.1.0
info:
  title: AI Registry API
  description: >
    Centralized registry for MCP servers and AI agents.
    Exposes a versioned HTTP API; all UIs are clients of this API.
  version: 0.1.0
  contact:
    name: AI Registry Team
servers:
  - url: /api/v1
    description: v1

tags:
  - name: system
    description: Health, readiness, and observability
  - name: publishers
    description: Publisher management (admin only)
  - name: mcp
    description: MCP server registry
  - name: agents
    description: AI agent registry
  - name: audit
    description: Audit log (admin only)

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      tags: [system]
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness probe
      description: Returns 200 when the service is ready to accept traffic (DB reachable).
      tags: [system]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /metrics:
    get:
      operationId: metrics
      summary: Prometheus metrics
      description: Exposes Prometheus-format metrics for scraping.
      tags: [system]
      responses:
        "200":
          description: Prometheus metrics text
          content:
            text/plain:
              schema:
                type: string

  /openapi.yaml:
    get:
      operationId: openapiSpec
      summary: OpenAPI 3.1 specification
      tags: [system]
      responses:
        "200":
          description: OpenAPI spec in YAML
          content:
            application/yaml:
              schema:
                type: string

  /api/v1/publishers:
    get:
      operationId: listPublishers
      summary: List publishers
      tags: [publishers]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Paginated list of publishers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublisherList"
    post:
      operationId: createPublisher
      summary: Create a publisher (admin only)
      tags: [publishers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublisherRequest"
      responses:
        "201":
          description: Publisher created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publisher"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/publishers/{slug}:
    get:
      operationId: getPublisher
      summary: Get a publisher by slug
      tags: [publishers]
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Publisher detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publisher"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers:
    get:
      operationId: listMCPServers
      summary: List MCP servers
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
        - name: namespace
          in: query
          description: Filter by publisher slug
          schema:
            type: string
        - name: status
          in: query
          description: Filter by lifecycle status
          schema:
            type: string
            enum: [draft, published, deprecated]
        - name: visibility
          in: query
          description: Filter by visibility (admin only — public requests always see public entries only)
          schema:
            type: string
            enum: [public, private]
      responses:
        "200":
          description: Paginated list of MCP servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServerList"
    post:
      operationId: createMCPServer
      summary: Create an MCP server entry (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMCPServerRequest"
      responses:
        "201":
          description: MCP server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/mcp/servers/{namespace}/{slug}:
    get:
      operationId: getMCPServer
      summary: Get an MCP server by namespace/slug
      tags: [mcp]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: MCP server detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServer"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers/{namespace}/{slug}/visibility:
    post:
      operationId: setMCPServerVisibility
      summary: Set MCP server visibility (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetVisibilityRequest"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  visibility:
                    type: string
                    enum: [public, private]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/mcp/servers/{namespace}/{slug}/deprecate:
    post:
      operationId: deprecateMCPServer
      summary: Deprecate an MCP server (admin only)
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Server deprecated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/agents:
    get:
      operationId: listAgents
      summary: List agents
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
        - name: namespace
          in: query
          description: Filter by publisher slug
          schema:
            type: string
        - name: status
          in: query
          description: Filter by lifecycle status
          schema:
            type: string
            enum: [draft, published, deprecated]
        - name: visibility
          in: query
          description: Filter by visibility (admin only)
          schema:
            type: string
            enum: [public, private]
      responses:
        "200":
          description: Paginated list of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
    post:
      operationId: createAgent
      summary: Create an agent entry (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/agents/{namespace}/{slug}:
    get:
      operationId: getAgent
      summary: Get an agent by namespace/slug
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/{namespace}/{slug}/visibility:
    post:
      operationId: setAgentVisibility
      summary: Set agent visibility (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetVisibilityRequest"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  visibility:
                    type: string
                    enum: [public, private]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/agents/{namespace}/{slug}/deprecate:
    post:
      operationId: deprecateAgent
      summary: Deprecate an agent (admin only)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Agent deprecated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/stats:
    get:
      operationId: getStats
      summary: Registry resource counts (admin only)
      tags: [system]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Total counts for each resource type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistryCounts"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/audit:
    get:
      operationId: listAuditEvents
      summary: List audit log events (admin only)
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: resource_type
          in: query
          description: Filter by resource type (mcp_server, agent, publisher)
          schema:
            type: string
        - name: resource_id
          in: query
          description: Filter by resource ULID
          schema:
            type: string
        - name: actor
          in: query
          description: Filter by Keycloak subject UUID
          schema:
            type: string
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Paginated list of audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /agents/{namespace}/{slug}/.well-known/agent-card.json:
    get:
      operationId: getAgentCard
      summary: A2A Agent Card
      description: Returns the Google A2A-compatible Agent Card for the given agent.
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/NamespaceParam"
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: A2A Agent Card
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /.well-known/oauth-protected-resource:
    get:
      operationId: oauthProtectedResource
      summary: MCP OAuth 2.0 Protected Resource Metadata
      description: RFC 8707 resource metadata required by the MCP authorization spec.
      tags: [system]
      responses:
        "200":
          description: Resource metadata
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
    NamespaceParam:
      name: namespace
      in: path
      required: true
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CursorParam:
      name: cursor
      in: query
      schema:
        type: string

  schemas:
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        error:
          type: string

    Publisher:
      type: object
      required: [id, slug, name, verified, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
        slug:
          type: string
        name:
          type: string
        contact:
          type: string
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePublisherRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        name:
          type: string
        contact:
          type: string

    PublisherList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Publisher"
        next_cursor:
          type: string
        total_count:
          type: integer

    MCPServer:
      type: object
      required: [id, namespace, slug, name, visibility, status, created_at, updated_at]
      properties:
        id:
          type: string
        namespace:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        homepage_url:
          type: string
        repo_url:
          type: string
        license:
          type: string
        visibility:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [draft, published, deprecated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMCPServerRequest:
      type: object
      required: [namespace, slug, name]
      properties:
        namespace:
          type: string
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        name:
          type: string
        description:
          type: string
        homepage_url:
          type: string
        repo_url:
          type: string
        license:
          type: string

    MCPServerList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MCPServer"
        next_cursor:
          type: string
        total_count:
          type: integer

    Agent:
      type: object
      required: [id, namespace, slug, name, visibility, status, created_at, updated_at]
      properties:
        id:
          type: string
        namespace:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [draft, published, deprecated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAgentRequest:
      type: object
      required: [namespace, slug, name]
      properties:
        namespace:
          type: string
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        name:
          type: string
        description:
          type: string

    AgentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        next_cursor:
          type: string
        total_count:
          type: integer

    RegistryCounts:
      type: object
      required: [mcp_servers, agents, publishers]
      properties:
        mcp_servers:
          type: integer
        agents:
          type: integer
        publishers:
          type: integer

    SetVisibilityRequest:
      type: object
      required: [visibility]
      properties:
        visibility:
          type: string
          enum: [public, private]

    AuditEvent:
      type: object
      required: [id, actor_subject, actor_email, action, resource_type, resource_id, created_at]
      properties:
        id:
          type: string
          description: ULID
        actor_subject:
          type: string
          description: Keycloak subject UUID
        actor_email:
          type: string
        action:
          type: string
          description: Action performed (e.g. mcp_server.created)
        resource_type:
          type: string
        resource_id:
          type: string
        resource_ns:
          type: string
        resource_slug:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    AuditEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        next_cursor:
          type: string

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Authenticated but lacks required scope
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Duplicate slug or version
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ValidationError:
      description: Request body failed schema validation
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

name: ai-registry-ci

# CI override — applied on top of docker-compose.yml via:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
#
# Relaxes every depends_on condition to service_started so that
# "docker compose up -d" returns immediately without blocking on Keycloak's
# slow JVM startup.  The GitHub Actions workflow polls each service for
# readiness explicitly before running the Playwright tests.

services:
  server:
    # E2E runs authenticate via the real OIDC flow and persist the session via
    # Playwright's storageState(), which only captures localStorage. Set
    # AUTH_STORAGE=local for CI so the SPA exposes its OIDC tokens where
    # Playwright can see them. Production must keep the 'session' default.
    environment:
      AUTH_STORAGE: local
    depends_on:
      postgres:
        condition: service_started
      keycloak:
        condition: service_started

  web:
    depends_on:
      server:
        condition: service_started
      keycloak:
        condition: service_started

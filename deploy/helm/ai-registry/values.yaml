# Default values for ai-registry.
# This is a YAML-formatted file.

nameOverride: ""
fullnameOverride: ""

image:
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ----------------------------------------------------------------------------
# Backend (Go HTTP service)
# ----------------------------------------------------------------------------
backend:
  replicaCount: 1

  image:
    repository: ghcr.io/haibread/ai-registry/backend
    # Defaults to .Chart.AppVersion when empty
    tag: ""

  # ── Auth (OIDC) ─────────────────────────────────────────────────────────
  # [REQUIRED] OIDC issuer URL — must match the `iss` claim in issued JWTs.
  oidcIssuer: ""
  # Optional audience claim check (leave empty to skip).
  oidcAudience: ""
  # Override the JWKS URL for internal network resolution (e.g. when the
  # server pod cannot reach the public issuer URL directly).
  # Example: http://keycloak:8080/realms/ai-registry/protocol/openid-connect/certs
  oidcJwksUrl: ""

  # ── Database ─────────────────────────────────────────────────────────────
  # DATABASE_URL — provide exactly one of the following (highest wins):
  #   databaseUrlSecret : name of a pre-existing Kubernetes Secret whose key
  #                       "DATABASE_URL" holds the connection string (recommended)
  #   databaseUrl       : plain-text value (not recommended for production)
  #   cnpg.enabled      : use the CNPG-managed cluster (see cnpg section)
  databaseUrl: ""
  databaseUrlSecret: ""
  # Connection pool sizes.
  dbMaxConns: 25
  dbMinConns: 5

  # ── HTTP ─────────────────────────────────────────────────────────────────
  # Comma-separated list of allowed CORS origins.
  # Example: "https://registry.example.com,https://admin.example.com"
  corsAllowedOrigins: ""
  # CIDR of the trusted reverse proxy for real-IP extraction via X-Forwarded-For.
  # Example: "10.0.0.0/8"
  trustedProxyCIDR: ""

  # ── Observability ────────────────────────────────────────────────────────
  # Structured log level: debug | info | warn | error
  logLevel: "info"
  # OTLP gRPC endpoint for traces/metrics export (leave empty to disable).
  # Example: http://otel-collector:4317
  otlpEndpoint: ""

  # ── Bootstrap ────────────────────────────────────────────────────────────
  # When enabled, the server loads a bootstrap file on startup and upserts
  # all publishers, MCP servers, and agents. Idempotent — safe to re-run.
  bootstrap:
    enabled: false
    # sampleData: load the built-in sample data bundled with the chart
    # (publishers + MCP servers + agents). Ignored when content is set.
    sampleData: false
    # content: inline YAML bootstrap file. Takes precedence over sampleData.
    # Paste the full contents of a bootstrap.yaml here.
    content: ""

  service:
    type: ClusterIP
    port: 8080

  resources: {}
  # Example:
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 256Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi

  podAnnotations: {}
  podLabels: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # ── Autoscaling ──────────────────────────────────────────────────────────
  # When enabled, an HPA manages the replica count; replicaCount is ignored.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    minAvailable: 1

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # Override the name (defaults to fullname-backend)
    name: ""

  # ── Escape hatches ───────────────────────────────────────────────────────
  # Extra environment variables injected into the server container.
  extraEnv: []
  # Example:
  # extraEnv:
  #   - name: MY_FEATURE_FLAG
  #     value: "true"
  #   - name: SECRET_FROM_K8S
  #     valueFrom:
  #       secretKeyRef:
  #         name: my-secret
  #         key: my-key

  # Extra volumes and mounts (e.g. for custom TLS certs or config files).
  extraVolumes: []
  extraVolumeMounts: []

# ----------------------------------------------------------------------------
# Web (Vite + React SPA served by nginx)
# ----------------------------------------------------------------------------
web:
  replicaCount: 1

  image:
    repository: ghcr.io/haibread/ai-registry/web
    # Defaults to .Chart.AppVersion when empty
    tag: ""

  # Non-sensitive environment variables
  # Internal URL for the SPA's API proxy (server-side only).
  # Falls back to the in-cluster backend service URL when empty.
  apiUrl: ""
  nextauthUrl: ""
  keycloakIssuer: ""

  # Sensitive environment variables stored in a generated Secret.
  authSecret: ""           # AUTH_SECRET
  keycloakId: ""           # AUTH_KEYCLOAK_ID
  keycloakSecret: ""       # AUTH_KEYCLOAK_SECRET

  service:
    type: ClusterIP
    port: 3000

  resources: {}

  podAnnotations: {}
  podLabels: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # nginx/Next.js writes cache files at runtime
    capabilities:
      drop:
        - ALL

  # ── Autoscaling ──────────────────────────────────────────────────────────
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    minAvailable: 1

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  # ── Escape hatches ───────────────────────────────────────────────────────
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []

# ----------------------------------------------------------------------------
# Ingress
# ----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations: {}
  # Example annotations for cert-manager + nginx:
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: ai-registry.example.com
  tls:
    enabled: false
    secretName: ""

# ----------------------------------------------------------------------------
# CloudNativePG (CNPG) managed Postgres cluster
# Set cnpg.enabled=true to provision a Postgres cluster inside the namespace.
# Requires the CNPG operator to be installed in the cluster.
# ----------------------------------------------------------------------------
cnpg:
  enabled: false
  instances: 1
  storageSize: 5Gi
  postgresVersion: "16"
  # Name of the superuser secret CNPG will create (referenced as DATABASE_URL
  # source in the backend deployment when cnpg.enabled=true).
  # CNPG creates a secret named "<clusterName>-superuser" automatically.
  # Override only if you need a specific secret name.
  superuserSecretName: ""

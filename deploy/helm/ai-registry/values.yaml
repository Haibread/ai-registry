# Default values for ai-registry.
# This is a YAML-formatted file.

nameOverride: ""
fullnameOverride: ""

image:
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ----------------------------------------------------------------------------
# Backend (Go HTTP service)
# ----------------------------------------------------------------------------
server:
  replicaCount: 1

  image:
    repository: ghcr.io/haibread/ai-registry/server
    # Defaults to .Chart.AppVersion when empty
    tag: ""

  # ── Auth (OIDC) ─────────────────────────────────────────────────────────
  # [REQUIRED] OIDC issuer URL — must match the `iss` claim in issued JWTs.
  oidcIssuer: ""
  # Optional audience claim check (leave empty to skip).
  oidcAudience: ""
  # Override the JWKS URL for internal network resolution (e.g. when the
  # server pod cannot reach the public issuer URL directly).
  # Example: http://keycloak:8080/realms/ai-registry/protocol/openid-connect/certs
  oidcJwksUrl: ""
  # [REQUIRED] Public OAuth 2.0 client ID for the browser SPA.
  # Served via GET /config.json so the frontend can configure its OIDC client
  # at runtime without baking this value into the Docker image.
  # Example: ai-registry-web
  oidcClientId: ""

  # ── Database ─────────────────────────────────────────────────────────────
  # DATABASE_URL — provide exactly one of the following (highest wins):
  #   databaseUrlSecret : name of a pre-existing Kubernetes Secret whose key
  #                       "DATABASE_URL" holds the connection string (recommended)
  #   databaseUrl       : plain-text value (not recommended for production)
  #   cnpg.enabled      : use the CNPG-managed cluster (see cnpg section)
  databaseUrl: ""
  databaseUrlSecret: ""
  # Connection pool sizes.
  dbMaxConns: 25
  dbMinConns: 5

  # ── HTTP ─────────────────────────────────────────────────────────────────
  # Comma-separated list of allowed CORS origins.
  # Example: "https://registry.example.com,https://admin.example.com"
  corsAllowedOrigins: ""
  # CIDR of the trusted reverse proxy for real-IP extraction via X-Forwarded-For.
  # Example: "10.0.0.0/8"
  trustedProxyCIDR: ""

  # ── Observability ────────────────────────────────────────────────────────
  # Structured log level: debug | info | warn | error
  logLevel: "info"
  # OTLP gRPC endpoint for traces/metrics export (leave empty to disable).
  # Example: http://otel-collector:4317
  otlpEndpoint: ""

  # ── Bootstrap ────────────────────────────────────────────────────────────
  # When enabled, the server loads a bootstrap file on startup and upserts
  # all publishers, MCP servers, and agents. Idempotent — safe to re-run.
  bootstrap:
    enabled: false
    # sampleData: load the built-in sample data bundled with the chart
    # (publishers + MCP servers + agents). Ignored when content is set.
    sampleData: false
    # content: inline YAML bootstrap file. Takes precedence over sampleData.
    # Paste the full contents of a bootstrap.yaml here.
    content: ""
    # Directory where the bootstrap ConfigMap is mounted inside the container.
    # The server reads <mountPath>/bootstrap.yaml (set via BOOTSTRAP_FILE env var).
    mountPath: /etc/ai-registry

  service:
    type: ClusterIP
    port: 8080

  resources: {}
  # Example:
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 256Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi

  podAnnotations: {}
  podLabels: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # ── Probes ───────────────────────────────────────────────────────────────
  # Full probe objects — override any field including httpGet.path/port,
  # initialDelaySeconds, periodSeconds, timeoutSeconds, failureThreshold, etc.
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    # 12 × 5 s = 60 s maximum startup budget before liveness kicks in.
    failureThreshold: 12

  # ── Volume mount paths ───────────────────────────────────────────────────
  # Writable /tmp directory for the read-only-root-filesystem container.
  tmpDir: /tmp

  # ── Autoscaling ──────────────────────────────────────────────────────────
  # When enabled, an HPA manages the replica count; replicaCount is ignored.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    minAvailable: 1

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # Override the name (defaults to fullname-backend)
    name: ""

  # ── Escape hatches ───────────────────────────────────────────────────────
  # Extra environment variables injected into the server container.
  extraEnv: []
  # Example:
  # extraEnv:
  #   - name: MY_FEATURE_FLAG
  #     value: "true"
  #   - name: SECRET_FROM_K8S
  #     valueFrom:
  #       secretKeyRef:
  #         name: my-secret
  #         key: my-key

  # Extra volumes and mounts (e.g. for custom TLS certs or config files).
  extraVolumes: []
  extraVolumeMounts: []

# ----------------------------------------------------------------------------
# Web (Vite + React SPA served by nginx)
# ----------------------------------------------------------------------------
web:
  replicaCount: 1

  image:
    repository: ghcr.io/haibread/ai-registry/web
    # Defaults to .Chart.AppVersion when empty
    tag: ""

  # Non-sensitive environment variables
  # Internal URL for the SPA's API proxy (server-side only).
  # Falls back to the in-cluster backend service URL when empty.
  apiUrl: ""
  nextauthUrl: ""
  keycloakIssuer: ""

  # Sensitive environment variables stored in a generated Secret.
  authSecret: ""           # AUTH_SECRET
  keycloakId: ""           # AUTH_KEYCLOAK_ID
  keycloakSecret: ""       # AUTH_KEYCLOAK_SECRET

  service:
    type: ClusterIP
    port: 80  # nginx listens on port 80; docker-compose maps host:3000 → container:80

  resources: {}

  podAnnotations: {}
  podLabels: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # nginx writes cache files at runtime
    capabilities:
      drop:
        - ALL

  # ── Probes ───────────────────────────────────────────────────────────────
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # ── Volume mount paths ───────────────────────────────────────────────────
  # Writable /tmp directory.
  tmpDir: /tmp
  # nginx runtime cache directory.
  cacheDir: /app/.next/cache

  # ── Autoscaling ──────────────────────────────────────────────────────────
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    minAvailable: 1

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  # ── Escape hatches ───────────────────────────────────────────────────────
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []

# ----------------------------------------------------------------------------
# Ingress (nginx / classic)
# ----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations: {}
  # Example annotations for cert-manager + nginx:
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: ai-registry.example.com
  tls:
    enabled: false
    secretName: ""

# ----------------------------------------------------------------------------
# Gateway API HTTPRoute
# An alternative to the Ingress resource for clusters running a Gateway API
# controller (Envoy Gateway, Cilium, Istio, Traefik v3, …).
#
# TLS is configured on the Gateway listener — not here. If your Gateway
# listener already terminates TLS for the hostname, the SPA and API will be
# served over HTTPS automatically without any change to this section.
#
# Both httpRoute and ingress can be enabled at the same time (e.g. during a
# migration), but enabling both for the same host with different controllers
# may cause conflicts. Enable only one per production environment.
# ----------------------------------------------------------------------------
httpRoute:
  enabled: false

  # [REQUIRED when enabled] Reference to the Gateway this route attaches to.
  gatewayRef:
    name: ""          # Name of the Gateway resource
    namespace: ""     # Namespace of the Gateway (empty = same namespace as this release)
    sectionName: ""   # Optional: specific listener section (e.g. "https")

  # Hostname the route matches. Should align with the Gateway listener's hostname.
  host: ai-registry.example.com

  annotations: {}

# ----------------------------------------------------------------------------
# CloudNativePG (CNPG) managed Postgres cluster
# Set cnpg.enabled=true to provision a Postgres cluster inside the namespace.
# Requires the CNPG operator to be installed in the cluster.
# ----------------------------------------------------------------------------
cnpg:
  enabled: false
  instances: 1
  storageSize: 5Gi
  postgresVersion: "16"

  # Database and owner created by the initdb bootstrap.
  initdb:
    database: ai_registry
    owner: ai_registry

  # PostgreSQL server parameters (free-form map — add any GUC you need).
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  # Allow the CNPG operator to connect as the superuser (needed for migrations).
  enableSuperuserAccess: true

  # Name of the superuser secret CNPG will create (referenced as DATABASE_URL
  # source in the backend deployment when cnpg.enabled=true).
  # CNPG creates a secret named "<clusterName>-superuser" automatically.
  # Override only if you need a specific secret name.
  superuserSecretName: ""

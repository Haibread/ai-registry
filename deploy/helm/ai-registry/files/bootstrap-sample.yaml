  # community/security-scanner — published, private
  - publisher: "community"
    slug: "security-scanner"
    name: "Security Scanner Agent"
    description: "Scans codebases and infrastructure configs for common vulnerabilities."
    public: false
    tags: ["security", "sast", "iac"]
    readme: |
      # Security Scanner Agent (internal)

      Runs static analysis across code and IaC (Terraform, Helm, k8s
      manifests) and returns a structured finding report.

      Kept **private** so that the list of known-vulnerable patterns isn't
      visible to unauthenticated users.
    versions:

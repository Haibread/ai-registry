# ── Agents ────────────────────────────────────────────────────────────────────
agents:
  # anthropic/code-review — published, public
  - publisher: "anthropic"
    slug: "code-review"
    name: "Code Review Agent"
    description: "Automatically reviews pull requests and suggests improvements."
    public: true
    versions:
      - version: "1.0.0"
        status: "published"
        endpoint_url: "https://agents.anthropic.com/code-review"
        default_input_modes: ["text/plain"]
        default_output_modes: ["text/plain"]
        skills:
          - id: "review-pr"
            name: "Review Pull Request"
            description: "Analyse a PR diff and post inline comments"
            tags: ["git", "code-quality"]
          - id: "suggest-fix"
            name: "Suggest Fix"
            description: "Generate a code fix for a flagged issue"
            tags: ["code-quality"]
        authentication:
          - scheme: "Bearer"

  # anthropic/browser-agent — published, public, text + image I/O
  - publisher: "anthropic"
    slug: "browser-agent"
    name: "Browser Automation Agent"
    description: "Controls a real browser to fill forms, click buttons, and extract information from any website."
    public: true
    versions:
      - version: "1.2.0"
        status: "published"
        endpoint_url: "https://agents.anthropic.com/browser"
        default_input_modes: ["text/plain", "application/json"]
        default_output_modes: ["text/plain", "image/png"]
        skills:
          - id: "navigate"
            name: "Navigate"
            description: "Open a URL in the browser"
            tags: ["browser", "automation"]
          - id: "click"
            name: "Click Element"
            description: "Click on a CSS selector"
            tags: ["browser", "automation"]
          - id: "screenshot"
            name: "Screenshot"
            description: "Capture the current viewport as a PNG"
            tags: ["browser", "visual"]
          - id: "extract"
            name: "Extract Data"
            description: "Pull structured data from a page using a schema"
            tags: ["browser", "data"]
        authentication:
          - scheme: "Bearer"

  # openai/data-analyst — published, public
  - publisher: "openai"
    slug: "data-analyst"
    name: "Data Analyst Agent"
    description: "Analyses structured datasets and produces charts and summaries."
    public: true
    versions:
      - version: "0.9.0"
        status: "published"
        endpoint_url: "https://agents.openai.com/data-analyst"
        default_input_modes: ["text/plain", "application/json", "text/csv"]
        default_output_modes: ["text/plain", "image/png", "application/json"]
        skills:
          - id: "analyse-csv"
            name: "Analyse CSV"
            description: "Parse and summarise a CSV file"
            tags: ["data", "csv"]
          - id: "plot-chart"
            name: "Plot Chart"
            description: "Generate a chart from tabular data"
            tags: ["data", "visualisation"]
          - id: "sql-query"
            name: "SQL Query"
            description: "Run a SQL query against an uploaded file"
            tags: ["data", "sql"]
        authentication:
          - scheme: "ApiKey"

  # openai/research-agent — deprecated
  - publisher: "openai"
    slug: "research-agent"
    name: "Research Agent"
    description: "Searches the web and academic databases to answer deep research questions."
    public: true
    status: "deprecated"
    versions:
      - version: "0.5.0"
        status: "published"
        endpoint_url: "https://agents.openai.com/research"
        default_input_modes: ["text/plain"]
        default_output_modes: ["text/plain"]
        skills:
          - id: "web-search"
            name: "Web Search"
            description: "Search the public web"
            tags: ["search", "research"]
          - id: "paper-search"
            name: "Paper Search"
            description: "Query arXiv and Semantic Scholar"
            tags: ["research", "academic"]
        authentication:
          - scheme: "Bearer"

  # community/docs-writer — published, public
  - publisher: "community"
    slug: "docs-writer"
    name: "Documentation Writer"
    description: "Generates and maintains API documentation from source code."
    public: true
    versions:
      - version: "0.2.0"
        status: "published"
        endpoint_url: "https://community.example.com/agents/docs-writer"
        default_input_modes: ["text/plain"]
        default_output_modes: ["text/plain"]
        skills:
          - id: "generate-docs"
            name: "Generate Docs"
            description: "Extract and write API documentation from code"
            tags: ["docs", "openapi"]
        authentication:
          - scheme: "Bearer"

  # community/devops-agent — draft (never published)
  - publisher: "community"
    slug: "devops-agent"
    name: "DevOps Agent"
    description: "Provisions cloud infrastructure, manages CI/CD pipelines, and monitors deployments."
    public: true
    versions:
      - version: "0.1.0"
        status: "draft"
        endpoint_url: "https://community.example.com/agents/devops"
        default_input_modes: ["text/plain", "application/json"]
        default_output_modes: ["text/plain", "application/json"]
        skills:
          - id: "deploy"
            name: "Deploy"
            description: "Deploy an application to a cloud provider"
            tags: ["cloud", "deploy"]
          - id: "monitor"
            name: "Monitor"
            description: "Check deployment health and logs"
            tags: ["cloud", "observability"]
          - id: "rollback"
            name: "Rollback"
            description: "Roll back to a previous release"
            tags: ["cloud", "deploy"]
        authentication:
          - scheme: "Bearer"
          - scheme: "ApiKey"

  # community/security-scanner — published, private
  - publisher: "community"
    slug: "security-scanner"
    name: "Security Scanner Agent"
    description: "Scans codebases and infrastructure configs for common vulnerabilities."
    public: false
    versions:
      - version: "1.0.0"
        status: "published"
        endpoint_url: "https://community.example.com/agents/security-scanner"
        default_input_modes: ["text/plain", "application/json"]
        default_output_modes: ["text/plain", "application/json"]
        skills:
          - id: "scan-code"
            name: "Scan Code"
            description: "Static analysis for common CVEs"
            tags: ["security", "sast"]
          - id: "scan-infra"
            name: "Scan Infra"
            description: "Check IaC files for misconfigurations"
            tags: ["security", "iac"]
        authentication:
          - scheme: "ApiKey"

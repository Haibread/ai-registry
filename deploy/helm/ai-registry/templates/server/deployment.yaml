apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-registry.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-registry.server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.server.autoscaling.enabled }}
  replicas: {{ .Values.server.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-registry.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force a rollout when the ConfigMap or Secret changes.
        checksum/configmap: {{ include (print $.Template.BasePath "/server/configmap.yaml") . | sha256sum }}
        {{- if and .Values.server.databaseUrl (not .Values.server.databaseUrlSecret) (not .Values.cnpg.enabled) }}
        checksum/secret: {{ include (print $.Template.BasePath "/server/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.server.bootstrap.enabled }}
        checksum/bootstrap: {{ include (print $.Template.BasePath "/server/bootstrap-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ai-registry.server.selectorLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ai-registry.server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          securityContext:
            {{- toYaml .Values.server.securityContext | nindent 12 }}
          image: {{ include "ai-registry.server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-registry.server.fullname" . }}
          env:
            {{- /*
              DATABASE_URL precedence (highest to lowest):
              1. External secret referenced by databaseUrlSecret
              2. CNPG-generated superuser secret (when cnpg.enabled)
              3. Plain-text value injected via ConfigMap (lowest)
            */}}
            {{- if .Values.server.databaseUrlSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.databaseUrlSecret }}
                  key: DATABASE_URL
            {{- else if .Values.cnpg.enabled }}
            # CNPG's superuser secret.uri hardcodes dbname=*; rebuild the DSN
            # so it targets the initdb database instead.
            - name: _PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-registry.cnpg.superuserSecretName" . }}
                  key: username
            - name: _PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-registry.cnpg.superuserSecretName" . }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(_PG_USER):$(_PG_PASSWORD)@{{ include "ai-registry.cnpg.clusterName" . }}-rw.{{ .Release.Namespace }}.svc:5432/{{ .Values.cnpg.initdb.database }}?sslmode=require"
            {{- else if .Values.server.databaseUrl }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-registry.server.fullname" . }}
                  key: DATABASE_URL
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.server.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.server.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.server.startupProbe | nindent 12 }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: {{ .Values.server.tmpDir }}
            {{- if .Values.server.bootstrap.enabled }}
            - name: bootstrap
              mountPath: {{ .Values.server.bootstrap.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.server.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.server.bootstrap.enabled }}
        - name: bootstrap
          configMap:
            name: {{ include "ai-registry.server.fullname" . }}-bootstrap
        {{- end }}
        {{- with .Values.server.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

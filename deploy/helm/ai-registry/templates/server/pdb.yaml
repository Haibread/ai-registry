apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ai-registry.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-registry.backend.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.backend.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "ai-registry.backend.selectorLabels" . | nindent 6 }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-registry.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-registry.server.labels" . | nindent 4 }}
data:
  # ── HTTP ──────────────────────────────────────────────────────────────────
  # Bind address must match the containerPort defined in the Deployment.
  HTTP_ADDR: ":{{ .Values.server.service.port }}"
  {{- if .Values.server.corsAllowedOrigins }}
  CORS_ALLOWED_ORIGINS: {{ .Values.server.corsAllowedOrigins | quote }}
  {{- end }}
  {{- if .Values.server.trustedProxyCIDR }}
  TRUSTED_PROXY_CIDR: {{ .Values.server.trustedProxyCIDR | quote }}
  {{- end }}

  # ── Auth (OIDC) ───────────────────────────────────────────────────────────
  OIDC_ISSUER: {{ .Values.server.oidcIssuer | quote }}
  {{- if .Values.server.oidcAudience }}
  OIDC_AUDIENCE: {{ .Values.server.oidcAudience | quote }}
  {{- end }}
  {{- if .Values.server.oidcJwksUrl }}
  OIDC_JWKS_URL: {{ .Values.server.oidcJwksUrl | quote }}
  {{- end }}
  # Public client ID served via GET /config.json to bootstrap the browser SPA.
  OIDC_CLIENT_ID: {{ .Values.server.oidcClientId | quote }}

  # ── Database ──────────────────────────────────────────────────────────────
  {{- /* Plain-text DATABASE_URL as a last resort (overridden by secret if set) */}}
  {{- if and .Values.server.databaseUrl (not .Values.server.databaseUrlSecret) (not .Values.cnpg.enabled) }}
  DATABASE_URL: {{ .Values.server.databaseUrl | quote }}
  {{- end }}
  DATABASE_MAX_CONNS: {{ .Values.server.dbMaxConns | quote }}
  DATABASE_MIN_CONNS: {{ .Values.server.dbMinConns | quote }}

  # ── Observability ─────────────────────────────────────────────────────────
  LOG_LEVEL: {{ .Values.server.logLevel | quote }}
  {{- if .Values.server.otlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.server.otlpEndpoint | quote }}
  {{- end }}

  # ── Bootstrap ─────────────────────────────────────────────────────────────
  {{- if .Values.server.bootstrap.enabled }}
  BOOTSTRAP_FILE: {{ printf "%s/bootstrap.yaml" .Values.server.bootstrap.mountPath | quote }}
  {{- end }}

{{- /*
This secret is rendered only when the user provides a plain-text databaseUrl
directly in values (i.e., not using an external pre-existing secret or CNPG).
When databaseUrlSecret is set, users are expected to create that secret
themselves; this template produces nothing.
*/}}
{{- if and .Values.server.databaseUrl (not .Values.server.databaseUrlSecret) (not .Values.cnpg.enabled) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-registry.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-registry.server.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.server.databaseUrl | quote }}
{{- end }}

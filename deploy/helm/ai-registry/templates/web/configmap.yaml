apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-registry.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-registry.web.labels" . | nindent 4 }}
data:
  {{- /*
    API_URL: upstream address nginx proxies /api/, /v0/, /config.json, etc. to.
    Defaults to the in-cluster server service URL derived from the release name.
    Override with web.apiUrl if the server is reachable via a different address.
  */}}
  API_URL: {{ .Values.web.apiUrl | default (printf "http://%s:%d" (include "ai-registry.server.fullname" .) (int .Values.server.service.port)) | quote }}

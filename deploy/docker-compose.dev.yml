name: ai-registry-dev

# Development stack — Vite dev server with hot reload.
#
# Usage (from the deploy/ directory):
#   docker compose -f docker-compose.dev.yml up -d
#
# The web service mounts ../web directly into the container and runs
# `vite dev`, so any file save is picked up immediately.
# Vite proxies /api/* and /v0/* to the server (configured in vite.config.ts).
# All other services are identical to the production compose.

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-realm-dev.json:/opt/keycloak/data/import/ai-registry-realm.json:ro
    ports:
      - "8080:8080"

  # ── Server ───────────────────────────────────────────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Mount the example bootstrap file and enable it automatically in dev.
      # Remove or override BOOTSTRAP_FILE in .env to disable.
      BOOTSTRAP_FILE: /etc/ai-registry/bootstrap.yaml
    volumes:
      - ./bootstrap.example.yaml:/etc/ai-registry/bootstrap.yaml:ro
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ── Web (Vite dev server with hot reload) ───────────────────────────────────
  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Install deps on first start (node_modules volume persists across restarts),
    # then launch the Vite dev server.
    # Wait for Keycloak's realm endpoint before starting.
    command: >
      sh -c "
        echo 'Waiting for Keycloak...' &&
        until wget -q -O /dev/null http://keycloak:8080/realms/ai-registry 2>/dev/null; do
          echo 'Keycloak not ready, retrying in 5s...' && sleep 5
        done &&
        echo 'Keycloak ready.' &&
        npm install &&
        npm run dev -- --host
      "
    environment:
      # Vite proxies /api/* to the server (see vite.config.ts), so API_URL is
      # only needed by the Vite proxy, not baked into the bundle.
      API_URL: http://server:8081
      # VITE_* vars are exposed to the browser bundle at runtime in dev mode.
      VITE_OIDC_ISSUER: "${VITE_OIDC_ISSUER:-http://localhost:8080/realms/ai-registry}"
      VITE_OIDC_CLIENT_ID: "${VITE_OIDC_CLIENT_ID:-ai-registry-web}"
      NODE_ENV: development
      # Polling is required for inotify to work through Docker volume mounts
      # on Linux and WSL2. Has no effect on macOS (native fsevents are used).
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Mount source so edits hot-reload without rebuilding the image.
      - ../web:/app
      # Keep node_modules in a named volume so the host copy never shadows
      # the container's installed packages.
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  postgres_data:
  web_node_modules:

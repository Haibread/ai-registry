name: ai-registry-dev

# Development stack — Next.js runs in dev mode with hot reload.
#
# Usage (from the deploy/ directory):
#   docker compose -f docker-compose.dev.yml up -d
#
# The web service mounts ../web directly into the container and runs
# `next dev`, so any file save is picked up immediately.
# All other services are identical to the production compose.

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Web (Next.js dev server with hot reload) ─────────────────────────────────
  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Install deps on first start (node_modules volume persists across restarts),
    # then launch the dev server.
    command: sh -c "npm install && npm run dev"
    environment:
      API_URL: http://backend:8081
      AUTH_SECRET: "${AUTH_SECRET:-dev-secret-replace-in-production}"
      AUTH_KEYCLOAK_ID: "${AUTH_KEYCLOAK_ID:-ai-registry-web}"
      AUTH_KEYCLOAK_SECRET: "${AUTH_KEYCLOAK_SECRET:-}"
      AUTH_KEYCLOAK_ISSUER: "${AUTH_KEYCLOAK_ISSUER:-http://keycloak:8080/realms/registry}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NODE_ENV: development
      # Polling is required for inotify to work through Docker volume mounts
      # on Linux and WSL2. Has no effect on macOS (native fsevents are used).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Mount source so edits hot-reload without rebuilding the image.
      - ../web:/app
      # Keep node_modules in a named volume so the host copy never shadows
      # the container's installed packages.
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  web_node_modules:

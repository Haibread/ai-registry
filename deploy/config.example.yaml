# ============================================================================
# AI Registry — YAML config file example
# ============================================================================
# Copy to config.yaml and adjust values.  Pass the path via --config or set
# CONFIG_FILE=/path/to/config.yaml.
#
# Environment variables always take precedence over values in this file.
# Missing keys fall back to built-in defaults (shown below).
# ============================================================================

http:
  # Address and port the HTTP server listens on.
  addr: ":8081"
  # Connection timeouts (Go duration strings).
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  # Allowed CORS origins.
  cors_origins: []
  #  - "http://localhost:3000"
  #  - "https://registry.example.com"
  # CIDR of the trusted reverse proxy (empty = no proxy).
  trusted_proxy_cidr: ""

database:
  # [REQUIRED] PostgreSQL DSN.
  url: "postgres://user:password@host:5432/ai_registry?sslmode=disable"
  max_conns: 25
  min_conns: 5

otel:
  service_name: "ai-registry-server"
  service_version: "0.1.0"
  # OTLP gRPC endpoint.  Empty = Prometheus /metrics only.
  otlp_endpoint: ""

log:
  # debug | info | warn | error
  level: "info"

auth:
  # [REQUIRED] OIDC issuer URL (must match `iss` claim in JWTs).
  oidc_issuer: ""
  # Override JWKS fetch URL (useful inside Docker where the public URL is
  # unreachable from the server container).
  oidc_jwks_url: ""

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak (dev mode, built-in H2 DB) ────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-realm-dev.json:/opt/keycloak/data/import/ai-registry-realm.json:ro
    ports:
      - "8080:8080"
      - "9000:9000"
    healthcheck:
      # Keycloak 23+ exposes health on the management port (9000), not 8080.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/ai-registry || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Server ───────────────────────────────────────────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ── Web (Vite SPA served by nginx) ──────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        VITE_OIDC_ISSUER: "${VITE_OIDC_ISSUER:-http://localhost:8080/realms/ai-registry}"
        VITE_OIDC_CLIENT_ID: "${VITE_OIDC_CLIENT_ID:-ai-registry-web}"
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_started
      keycloak:
        condition: service_healthy

  # ── OTel Collector (observability profile) ──────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    profiles: [observability]
    restart: unless-stopped
    command: --config /etc/otel/config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # ── Jaeger (observability profile) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.65
    profiles: [observability]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4319:4317"    # OTLP gRPC (offset to avoid conflict with collector)

volumes:
  postgres_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak (dev mode, built-in H2 DB) ────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-realm-dev.json:/opt/keycloak/data/import/ai-registry-realm.json:ro
    ports:
      - "8080:8080"
      - "9000:9000"
    healthcheck:
      # Keycloak 23+ exposes health on the management port (9000), not 8080.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/ai-registry || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Server ───────────────────────────────────────────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Dev defaults — Keycloak is exposed on localhost:8080 from the host,
      # but the server container reaches it via the internal Docker network.
      # OIDC_ISSUER is the public-facing URL (matches the `iss` claim in tokens).
      # OIDC_JWKS_URL lets the server fetch JWKS internally without going via the host.
      # Override any of these in .env to customise for your environment.
      OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:8080/realms/ai-registry}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-ai-registry-web}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/ai-registry/protocol/openid-connect/certs}
      DATABASE_URL: ${DATABASE_URL:-postgres://registry:registry@postgres:5432/registry?sslmode=disable}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    # No healthcheck: the distroless runtime image has no shell or wget.
    # Use `docker inspect` or check http://localhost:8081/readyz from the host.

  # ── Web (Vite SPA served by nginx) ──────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      # nginx proxies /api/, /v0/, /config.json, etc. to this upstream.
      API_URL: "http://server:8081"
    ports:
      - "3000:8080"
    depends_on:
      server:
        condition: service_started
      keycloak:
        condition: service_healthy

  # ── OTel Collector (observability profile) ──────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    profiles: [observability]
    restart: unless-stopped
    command: --config /etc/otel/config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # ── Jaeger (observability profile) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.65
    profiles: [observability]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4319:4317"    # OTLP gRPC (offset to avoid conflict with collector)

volumes:
  postgres_data:
